# =============================================================================
# Project Configuration
# GNN-Based Retrieval for Grounded QA on the EU AI Act
# =============================================================================

project:
  name: "gnn-eu-ai-act-retrieval"
  seed: 42

# --- Data Paths ---
paths:
  raw_pdf: "data/raw/eu_ai_act.pdf"
  parsed_text: "data/processed/parsed_text.json"
  nodes_csv: "data/processed/nodes.csv"
  edges_csv: "data/processed/edges.csv"
  node_features: "data/embeddings/node_features.npy"
  node_id_mapping: "data/embeddings/node_id_mapping.json"
  graph_object: "data/graphs/eu_ai_act_graph.pt"
  model_checkpoint: "models/checkpoints/graphsage_best.pt"
  gcn_embeddings: "models/embeddings/gcn_node_embeddings.npy"
  gnn_embeddings: "models/embeddings/gnn_node_embeddings.npy"

# --- PDF Parsing ---
parsing:
  method: "pdfplumber"  # pdfplumber | PyPDF2
  output_format: "json"

# --- Node Construction ---
nodes:
  types:
    - article
    - paragraph
    - sub_paragraph
    - recital
    - annex
    - annex_item
    - definition
  metadata_fields:
    - node_id
    - title
    - type
    - text
    - page
    - article_number
    - chapter
    - annex
    - parent_id

# --- Edge Construction ---
edges:
  structural:
    - part_of
    - contains
  cross_reference:
    - refers_to
  definition:
    - defines
    - uses_term
  optional:
    - similar_to
  similarity_threshold: 0.85  # for semantic similarity edges

# --- Text Embedding ---
embedding:
  model_name: "sentence-transformers/multi-qa-mpnet-base-cos-v1"
  embedding_dim: 768
  batch_size: 64
  max_length: 512
  progress_bar: false

# --- GNN Model ---
gnn:
  architecture: "GraphSAGE"  # GraphSAGE | GAT | RGCN
  hidden_channels: 768
  out_channels: 768
  num_layers: 2
  dropout: 0.5
  aggregation: "mean"  # mean | max | lstm (for GraphSAGE)

  # GAT-specific (if architecture is GAT)
  gat:
    heads: 4
    concat: true

  # R-GCN specific (if architecture is RGCN)
  rgcn:
    num_relations: 5  # number of edge types
    num_bases: 4

# --- Training ---
training:
  method: "contrastive"  # contrastive | link_prediction
  epochs: 200
  learning_rate: 0.0005
  weight_decay: 0.001
  batch_size: 256
  patience: 8  # early stopping patience
  num_negatives: 3  # negative samples per positive
  temperature: 0.07  # for contrastive loss
  margin: 1.0  # for margin-based loss
  optimizer: "adam"
  scheduler: "cosine"  # cosine | step | none

  # Edge split ratios for unsupervised training/validation
  train_ratio: 0.8
  val_ratio: 0.2
  test_ratio: 0.0

# --- Retrieval ---
retrieval:
  top_k: 10
  methods:
    - bm25
    - dense
    - gnn
  similarity_metric: "cosine"  # cosine | dot_product
  bm25:
    enabled: true
  context_expansion:
    enabled: true
    hops: 1
    max_neighbors: 10
  reranking:
    enabled: true
    model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    weight: 0.4

# --- QA Generation ---
qa:
  model: "gpt-4"  # or local model
  max_context_tokens: 4096
  temperature: 0.1
  prompt_template: |
    You are a legal assistant specialising in the EU AI Act.
    Answer the following question using ONLY the provided legal provisions.
    Cite the specific article, paragraph, or section for each claim.
    If the evidence is insufficient, say so explicitly.

    Question: {question}

    Evidence:
    {evidence}

    Answer:

# --- Evaluation ---
evaluation:
  metrics:
    - recall_at_k
    - precision_at_k
    - mrr
    - ndcg_at_k
  k_values: [1, 3, 5, 10, 20]
  ablation:
    - text_only
    - structural_edges_only
    - structural_and_reference
    - all_edges

# --- Logging ---
logging:
  use_wandb: false
  wandb_project: "gnn-eu-ai-act"
  log_every: 10  # log metrics every N epochs
  save_every: 50  # save checkpoint every N epochs

# --- Visualisation ---
visualization:
  matplotlib:
    seaborn_style: "whitegrid"
    seaborn_palette: "muted"
    font_scale: 1.1
    figure_dpi: 120
    figure_size: [10, 5]
  plotly:
    axis_color: "#475569"
    title_color: "#000000"
    subtitle_color: "#64748B"
    text_color: "#334155"
    grid_color: "#E2E8F0"
    paper_bgcolor: "#FFFFFF"
    plot_bgcolor: "#FFFFFF"
    footnote_color: "#94A3B8"
    sequence:
      - "#1F3A5F"
      - "#2F5D8A"
      - "#4A7FA7"
      - "#6B9EC9"
      - "#0F172A"
      - "#334155"
      - "#64748B"
      - "#94A3B8"
      - "#CBD5E1"
      - "#0F766E"
      - "#14B8A6"
      - "#15803D"
      - "#22C55E"
      - "#C2410C"
      - "#F59E0B"
      - "#B91C1C"
    continuous_scale:
      - [0.0, "#CBD5E1"]
      - [0.25, "#6B9EC9"]
      - [0.5, "#2F5D8A"]
      - [0.75, "#C2410C"]
      - [1.0, "#B91C1C"]
    heatmap_scale:
      - [0.0, "#CBD5E1"]
      - [0.35, "#6B9EC9"]
      - [0.65, "#C2410C"]
      - [1.0, "#B91C1C"]
    title_font_size: 30
    subtitle_font_size: 20
    base_font_size: 15
    axis_title_font_size: 10
    axis_tick_font_size: 12
    hover_font_size: 12
    footnote_font_size: 12
    title_pad_top: 20
    footnote_y: -0.16
    grid_width: 0.6
    margin:
      l: 70
      r: 30
      t: 115
      b: 105
