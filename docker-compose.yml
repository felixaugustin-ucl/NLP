version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nlp_group_project_app
    working_dir: /workspace
    volumes:
      - ./:/workspace
    ports:
      - "8888:8888"
    stdin_open: true
    tty: true
    environment:
      - MPLCONFIGDIR=/tmp/matplotlib
      - PYTHONUNBUFFERED=1
